<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sensor Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <button id="btn-connect" class="btn primary">Connect BLE</button>
            </div>
            <div class="header-right">
                <span id="battery-status" class="hidden"><span class="icon">🔋</span> <span id="val-batt">--</span>%</span>
                <button id="btn-settings" class="btn icon-btn">⚙️</button>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <button id="tab-simple" class="tab active">Simple</button>
                <button id="tab-advanced" class="tab">Advanced</button>
            </div>

            <!-- Alert Card -->
            <div id="alert-card" class="card alert-card">
                <div class="alert-header">
                    <span id="alert-type">СОВЕТ</span>
                </div>
                <div class="alert-body">
                    <p id="alert-text">Ожидание подключения к датчикам...</p>
                </div>
            </div>

            <!-- Simple Mode View -->
            <div id="view-simple" class="view active">
                <div class="grid">
                    <div class="card metric">
                        <div class="label">Heart Rate <button class="btn-info" data-param="hr">i</button></div>
                        <div class="value"><span id="val-hr">--</span> <span class="unit">bpm</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">SpO2 <button class="btn-info" data-param="spo2">i</button></div>
                        <div class="value"><span id="val-spo2">--</span> <span class="unit">%</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">CO2 Level <button class="btn-info" data-param="co2">i</button></div>
                        <div class="value"><span id="val-co2">--</span> <span class="unit">ppm</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">Pressure <button class="btn-info" data-param="p">i</button></div>
                        <div class="value"><span id="val-p">--</span> <span class="unit">hPa</span></div>
                    </div>
                </div>
            </div>

            <!-- Advanced Mode View -->
            <div id="view-advanced" class="view hidden">
                <div class="grid">
                    <div class="card metric">
                        <div class="label">Altitude (h) <button class="btn-info" data-param="h">i</button></div>
                        <div class="value"><span id="val-h">--</span> <span class="unit">m</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">Expected SpO2 <button class="btn-info" data-param="spo2_exp">i</button></div>
                        <div class="value"><span id="val-spo2-exp">--</span> <span class="unit">%</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">PaO2 <button class="btn-info" data-param="pao2">i</button></div>
                        <div class="value"><span id="val-pao2">--</span> <span class="unit">mmHg</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">Systemic Shock (SS) <button class="btn-info" data-param="ss">i</button></div>
                        <div class="value"><span id="val-ss">--</span></div>
                    </div>
                    <div class="card metric">
                        <div class="label">ΔP (3 hours) <button class="btn-info" data-param="dp">i</button></div>
                        <div class="value"><span id="val-dp">--</span> <span class="unit">hPa</span></div>
                    </div>
                </div>
            </div>

            <!-- Debug Console -->
            <div class="card debug-card" style="margin-top: 24px; border: 1px dashed var(--card-border);">
                <div class="label" style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Debug Console (Raw BLE)</div>
                <pre id="raw-ble-data" style="font-family: monospace; font-size: 11px; color: var(--text-muted); overflow-x: auto; white-space: pre-wrap; margin-top: 8px;">Waiting for data...</pre>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal hidden">
        <div class="modal-content card">
            <h2>Settings</h2>
            <div class="input-group">
                <label for="input-sbp">Base Systolic BP (mmHg)</label>
                <input type="number" id="input-sbp" value="120" min="60" max="250">
            </div>
            <div class="modal-actions">
                <button id="btn-save-settings" class="btn primary">Save & Close</button>
            </div>
        </div>
    </div>

    <!-- Parameter Info Modal -->
    <div id="modal-info" class="modal hidden">
        <div class="modal-content card">
            <h2 id="info-title">Parameter</h2>
            <p id="info-desc" style="line-height: 1.5; color: var(--text-muted); margin-bottom: 24px;">Description goes here.</p>
            <div class="modal-actions">
                <button id="btn-close-info" class="btn primary">Close</button>
            </div>
        </div>
    </div>

    <script src="scenarios.js"></script>
    <script src="mathCore.js"></script>
    <script src="logicEngine.js"></script>
    <script src="app.js"></script>
</body>
</html>
